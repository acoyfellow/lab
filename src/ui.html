<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>lab</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: monospace; background: #0a0a0a; color: #e0e0e0; padding: 2rem; max-width: 900px; margin: 0 auto; }
  h1 { font-size: 1.4rem; color: #f90; }
  p.sub { color: #666; font-size: 12px; margin-bottom: 1.5rem; }
  .tabs { display: flex; gap: 0; margin-bottom: 0; }
  .tab { padding: 0.5rem 1rem; cursor: pointer; background: #111; border: 1px solid #333;
    border-bottom: none; color: #666; font-family: monospace; font-size: 13px; }
  .tab.active { color: #f90; background: #1a1a1a; border-bottom: 1px solid #1a1a1a; }
  textarea { width: 100%; height: 180px; background: #1a1a1a; color: #0f0; border: 1px solid #333;
    border-top: none; padding: 1rem; font-family: monospace; font-size: 14px; resize: vertical; }
  button { background: #f90; color: #000; border: none; padding: 0.5rem 1.5rem;
    font-family: monospace; font-weight: bold; cursor: pointer; margin-top: 0.5rem; }
  button:hover { background: #fa0; }
  button.secondary { background: #333; color: #ccc; }
  button.secondary:hover { background: #444; }
  pre { background: #111; border: 1px solid #333; padding: 1rem; margin-top: 1rem;
    white-space: pre-wrap; min-height: 60px; font-size: 13px; overflow-x: auto; }
  .meta { color: #555; font-size: 11px; margin-top: 0.5rem; }
  .cap-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; margin-right: 4px; }
  .cap-on { background: #1a3a1a; color: #4f4; border: 1px solid #2a5a2a; }
  .cap-off { background: #3a1a1a; color: #f44; border: 1px solid #5a2a2a; }
</style>
</head><body>
<h1>lab</h1>
<p class="sub">Effect + Worker Loaders. Capabilities as types.</p>

<div class="tabs">
  <div class="tab active" id="tab-sandbox" onclick="switchTab('sandbox')">01: sandbox</div>
  <div class="tab" id="tab-kv" onclick="switchTab('kv')">02: kv read</div>
</div>

<textarea id="code"></textarea>

<div style="display:flex;gap:0.5rem;align-items:center;margin-top:0.5rem">
  <button onclick="run()">run</button>
  <button class="secondary" onclick="seed()">seed kv</button>
  <span id="caps"></span>
</div>

<pre id="out">// output</pre>
<p class="meta" id="meta"></p>

<script>
var tabs = {
  sandbox: {
    code: "// sandboxed isolate. no capabilities.\n// try: return { n: Math.random(), ts: new Date().toISOString() }\n\nreturn { sum: [1,2,3].reduce((a,b) => a+b, 0) };",
    endpoint: '/run',
    caps: [['network', false], ['kv read', false], ['kv write', false]],
    meta: 'phase 1: pure compute. globalOutbound = null.'
  },
  kv: {
    code: "// this isolate can read KV. try:\n// const val = await kv.get(\"user:1\");\n// const keys = await kv.list(\"user:\");\n\nconst keys = await kv.list(\"user:\");\nconst users = [];\nfor (const key of keys) {\n  const raw = await kv.get(key);\n  users.push(JSON.parse(raw));\n}\nreturn { users };",
    endpoint: '/run/kv',
    caps: [['network', false], ['kv read', true], ['kv write', false]],
    meta: 'phase 2: KvRead capability granted. can read, cannot write, cannot fetch.'
  }
};

var current = 'sandbox';

function switchTab(name) {
  current = name;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
  var t = tabs[name];
  document.getElementById('code').value = t.code;
  document.getElementById('caps').innerHTML = t.caps.map(function(c) {
    return '<span class="cap-badge ' + (c[1] ? 'cap-on' : 'cap-off') + '">' + c[0] + '</span>';
  }).join('');
  document.getElementById('meta').textContent = t.meta;
  document.getElementById('out').textContent = '// output';
}

function run() {
  var out = document.getElementById('out');
  var code = document.getElementById('code').value;
  out.textContent = 'running...';
  var t0 = performance.now();
  fetch(tabs[current].endpoint, {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ code: code }),
  }).then(function(r) { return r.json(); }).then(function(json) {
    var ms = (performance.now() - t0).toFixed(1);
    out.textContent = JSON.stringify(json, null, 2) + '\n\n// ' + ms + 'ms';
  }).catch(function(e) {
    out.textContent = 'error: ' + e.message;
  });
}

function seed() {
  var out = document.getElementById('out');
  fetch('/seed', { method: 'POST' }).then(function(r) { return r.json(); }).then(function(json) {
    out.textContent = JSON.stringify(json, null, 2);
  });
}

switchTab('sandbox');
</script>
</body></html>
