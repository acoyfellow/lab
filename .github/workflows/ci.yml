name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun test
      - run: bun run lint
      - run: bun run check
      - name: Verify lab-mcp dist is fresh
        run: |
          cp -r packages/lab-mcp/dist dist-backup
          cd packages/lab-mcp && bun run build
          cd ../..
          diff -r dist-backup packages/lab-mcp/dist || (echo "dist/ is stale. Run 'cd packages/lab-mcp && bun run build' and commit changes." && exit 1)

  artifacts-gate:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Run existing Artifacts Lab gate
        run: LAB_ARTIFACTS_EXISTING_TEST=1 bun test src/lib/runs/run-spine.artifacts.test.ts
        env:
          LAB_ARTIFACTS_ACCOUNT_ID: ${{ secrets.LAB_ARTIFACTS_ACCOUNT_ID }}
          LAB_ARTIFACTS_NAMESPACE: ${{ secrets.LAB_ARTIFACTS_NAMESPACE }}
          LAB_ARTIFACTS_REPO: ${{ secrets.LAB_ARTIFACTS_REPO }}
          LAB_ARTIFACTS_BRANCH: ${{ secrets.LAB_ARTIFACTS_BRANCH }}
          LAB_ARTIFACTS_REPO_TOKEN: ${{ secrets.LAB_ARTIFACTS_REPO_TOKEN }}
      - name: Run control-plane Artifacts Lab gate
        run: LAB_ARTIFACTS_TEST=1 bun test src/lib/runs/run-spine.artifacts.test.ts
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
